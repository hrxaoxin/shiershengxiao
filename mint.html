        body {

            background-color: #f5f5f5;
            background-image: linear-gradient(135deg, #f5f5f5 0%, #e8f5e8 100%);

            position: fixed;

        }

        }
        
        @keyframes navbarSlideUp {
            from {
                transform: translateY(100%);

            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

    <script src="abis.js"></script>
    <script>
        // 从abis.js中加载合约地址
        const rewardManagerAddress = window.contractAddresses.rewardManager;
        const tokenBurnerAddress = window.contractAddresses.tokenBurner;
        const zodiacNFTAddress = window.contractAddresses.zodiacNFT;

        // Web3实例
        let web3;
        let rewardManagerContract;
        let tokenBurnerContract;
        let zodiacNFTContract;
        let account;

        // 粒子背景效果
        document.addEventListener('DOMContentLoaded', function() {
            particlesJS('particles-js', {
                particles: {
                    number: {
                        value: 80,
                        density: {
                            enable: true,
                            value_area: 800
                        }
                    },
                    color: {
                        value: '#ff6b6b'
                    },
                    shape: {
                        type: 'circle',
                        stroke: {
                            width: 0,
                            color: '#000000'
                        }
                    },
                    opacity: {
                        value: 0.5,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 1,
                            opacity_min: 0.1,
                            sync: false
                        }
                    },
                    size: {
                        value: 5,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 2,
                            size_min: 0.1,
                            sync: false
                        }
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: '#ff6b6b',
                        opacity: 0.4,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 1,
                        direction: 'none',
                        random: false,
                        straight: false,
                        out_mode: 'out',
                        bounce: false,
                        attract: {
                            enable: false,
                            rotateX: 600,
                            rotateY: 1200
                        }
                    }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: {
                        onhover: {
                            enable: true,
                            mode: 'grab'
                        },
                        onclick: {
                            enable: true,
                            mode: 'push'
                        },
                        resize: true
                    },
                    modes: {
                        grab: {
                            distance: 140,
                            line_linked: {
                                opacity: 1
                            }
                        },
                        bubble: {
                            distance: 400,
                            size: 40,
                            duration: 2,
                            opacity: 8,
                            speed: 3
                        },
                        repulse: {
                            distance: 200,
                            duration: 0.4
                        },
                        push: {
                            particles_nb: 4
                        },
                        remove: {
                            particles_nb: 2
                        }
                    }
                },
                retina_detect: true
            });
        });

        // 初始化Web3
        async function initWeb3() {
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                try {
                    // 请求账户访问
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    account = accounts[0];
                    
                    // 初始化合约
                    rewardManagerContract = new web3.eth.Contract(window.rewardManagerABI, rewardManagerAddress);
                    tokenBurnerContract = new web3.eth.Contract(window.tokenBurnerABI, tokenBurnerAddress);
                    zodiacNFTContract = new web3.eth.Contract(window.zodiacNFTABI, zodiacNFTAddress);
                    
                    // 更新钱包按钮
                    updateWalletButton();
                    
                    // 加载数据
                    loadData();
                } catch (error) {
                    console.error('初始化Web3失败:', error);
                }
            } else {
                console.log('请安装MetaMask等Web3钱包插件');
            }
        }

        // 更新钱包按钮
        function updateWalletButton() {
            const walletBtn = document.getElementById('walletBtn');
            const walletAddress = document.getElementById('walletAddress');
            if (account) {
                const shortAddress = account.substring(0, 4) + '...' + account.substring(account.length - 4);
                walletBtn.textContent = shortAddress;
                walletBtn.style.background = 'linear-gradient(135deg, #4338ca 0%, #3730a3 100%)';
                walletAddress.textContent = account;
            }
        }

        // 加载数据
        async function loadData() {
            if (!tokenBurnerContract || !account) return;
            
            try {
                // 获取可铸造次数
                const burnCount = await tokenBurnerContract.methods.getBurnCount(account).call();
                document.getElementById('mintCount').textContent = burnCount;
                
                // 启用/禁用铸造按钮
                const mintBtn = document.getElementById('mintBtn');
                if (Number(burnCount) > 0) {
                    mintBtn.disabled = false;
                    document.getElementById('mintBtnText').textContent = '开始铸造';
                } else {
                    mintBtn.disabled = true;
                    document.getElementById('mintBtnText').textContent = '无铸造次数';
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 铸造NFT
        async function mintNFT() {
            if (!zodiacNFTContract || !account) return;
            
            try {
                // 显示加载状态
                document.getElementById('mintBtnText').classList.add('hidden');
                document.getElementById('mintLoading').classList.remove('hidden');
                document.getElementById('mintBtn').disabled = true;
                
                // 调用铸造函数
                const result = await zodiacNFTContract.methods.mint().send({ from: account });
                
                // 解析铸造结果
                const event = result.events.CardMinted;
                if (event) {
                    const tokenId = event.returnValues.cardId;
                    const zodiacType = event.returnValues.cardType;
                    const starLevel = event.returnValues.starLevel;
                    
                    // 更新铸造历史
                    updateMintHistory(tokenId, zodiacType, starLevel);
                    
                    // 重新加载数据
                    loadData();
                }
            } catch (error) {
                console.error('铸造失败:', error);
                alert('铸造失败，请检查钱包是否有足够的代币');
            } finally {
                // 恢复按钮状态
                document.getElementById('mintBtnText').classList.remove('hidden');
                document.getElementById('mintLoading').classList.add('hidden');
                document.getElementById('mintBtn').disabled = false;
            }
        }

        // 更新铸造历史
        function updateMintHistory(tokenId, zodiacType, starLevel) {
            const historyContainer = document.getElementById('mintHistory');
            const zodiacNames = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
            
            const historyItem = document.createElement('div');
            historyItem.className = 'flex justify-between items-center p-3 bg-white rounded-lg mb-2 shadow-sm';
            historyItem.innerHTML = `
                <div>
                    <div class="font-semibold">${zodiacNames[zodiacType]} #${tokenId}</div>
                    <div class="text-xs text-gray-500">星阶: ${starLevel}</div>
                </div>
                <div class="text-green-500">✅</div>
            `;
            
            // 插入到历史记录顶部
            if (historyContainer.querySelector('p')) {
                historyContainer.innerHTML = '';
            }
            historyContainer.insertBefore(historyItem, historyContainer.firstChild);
        }

        // Web3钱包连接功能
        document.addEventListener('DOMContentLoaded', function() {
            const walletBtn = document.getElementById('walletBtn');
            const mintBtn = document.getElementById('mintBtn');
            
            walletBtn.addEventListener('click', function() {
                initWeb3();
            });
            
            mintBtn.addEventListener('click', function() {
                if (account) {
                    mintNFT();
                } else {
                    initWeb3();
                }
            });
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 尝试自动连接钱包
            initWeb3();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</body>
</html>
